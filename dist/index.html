document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 style=\"position: fixed; inset: 0; pointer-events: none; z-index: 3; background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, oklch(0% 0 0 / 0.18) 3px); mix-blend-mode: multiply;\"><\u002Fdiv>\n\n  <!-- ambient glow -->\n  <div style=\"position: fixed; top: -20%; right: -10%; width: 60vw; height: 60vw; max-width: 900px; max-height: 900px; border-radius: 50%; background: radial-gradient(circle, {{ accentSoft }} 0%, transparent 70%); pointer-events: none; z-index: 0; filter: blur(10px);\"><\u002Fdiv>\n\n  <!-- NAV -->\n  <nav style=\"position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; align-items: center; gap: 4px; padding: 8px; background: oklch(7% 0.02 145 / 0.85); backdrop-filter: blur(16px); border: 1px solid {{ accentBorder }}; border-radius: 10px; box-shadow: 0 0 30px oklch(6% 0.02 145 / 0.6), 0 0 12px {{ accentSoft }};\">\n    <span style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: 15px; padding: 8px 14px; color: {{ accent }}; letter-spacing: 1px;\">&gt;_PS<\u002Fspan>\n    <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n      <a href=\"{{ item.href }}\" style=\"font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: 6px; text-decoration: none; color: {{ item.color }}; background: {{ item.bg }}; transition: color 0.2s; font-family: 'JetBrains Mono', monospace;\">{{ item.label }}<\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <section id=\"hero\" data-screen-label=\"Hero\" style=\"position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 140px 40px 80px; box-sizing: border-box;\">\n    <div style=\"max-width: 1240px; width: 100%; display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; align-items: center;\">\n\n      <div style=\"perspective: 1400px;\">\n        <div style=\"{{ heroTiltStyleStr }}; transform-style: preserve-3d;\">\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 15px; color: {{ accent }}; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px;\">root@backend:~$ whoami<\u002Fdiv>\n          <h1 style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: clamp(46px, 7vw, 92px); line-height: 1.0; margin: 0; letter-spacing: -1px; color: oklch(94% 0.1 145); text-shadow: 1px 1px 0 oklch(53% 0.17 145),2px 2px 0 oklch(50% 0.17 145),3px 3px 0 oklch(48% 0.17 145),4px 4px 0 oklch(46% 0.17 145),5px 5px 0 oklch(43% 0.17 145),6px 6px 0 oklch(41% 0.17 145),7px 7px 0 oklch(39% 0.17 145),8px 8px 0 oklch(37% 0.17 145),9px 9px 0 oklch(34% 0.17 145),10px 10px 0 oklch(32% 0.17 145),11px 11px 0 oklch(30% 0.17 145),12px 12px 0 oklch(27% 0.17 145),13px 13px 0 oklch(25% 0.17 145),14px 14px 0 oklch(23% 0.17 145),0 0 60px oklch(75% 0.22 145 / 0.45); animation: flicker 6s infinite;\">\n            PRIYANSHU<br>SHUKLA\n          <\u002Fh1>\n          <p style=\"font-size: 17.5px; line-height: 1.7; color: oklch(70% 0.05 145); max-width: 520px; margin: 34px 0 0;\">\n            Building high-traffic, distributed systems — payments, event-driven microservices, and API gateways serving <strong style=\"color: {{ accent }};\">millions of subscribers<\u002Fstrong>.\n          <\u002Fp>\n          <div style=\"display: flex; gap: 14px; margin-top: 38px; flex-wrap: wrap;\">\n            <a href=\"#projects\" style=\"font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14.5px; padding: 15px 28px; border-radius: 6px; background: {{ accent }}; color: oklch(8% 0.02 145); text-decoration: none; box-shadow: 0 0 30px {{ accentSoft }};\">[ view_work ]<\u002Fa>\n            <a href=\"#resume\" style=\"font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14.5px; padding: 15px 28px; border-radius: 6px; background: transparent; color: {{ accent }}; text-decoration: none; border: 1px solid {{ accentBorder }};\">[ resume ]<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MASCOT -->\n      <div style=\"position: relative; display: flex; align-items: center; justify-content: center; height: 420px; perspective: 1000px;\">\n        <div style=\"{{ mascotFloatStyle }}\">\n          <div style=\"{{ mascotTiltStyleStr }};\">\n            <div style=\"width: 210px; height: 210px; border-radius: 58% 42% 55% 45% / 55% 45% 58% 42%; background: linear-gradient(150deg, {{ accentLight }}, {{ accent }} 55%, {{ accentDark }}); box-shadow: 0 40px 70px oklch(4% 0.02 145 / 0.7), 0 0 50px {{ accentSoft }}, inset -18px -18px 36px oklch(20% 0.15 145 / 0.4), inset 14px 14px 24px oklch(90% 0.15 145 / 0.35); position: relative; overflow: hidden;\">\n              <div style=\"position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, oklch(0% 0 0 / 0.12) 4px); pointer-events: none;\"><\u002Fdiv>\n              <!-- eyes -->\n              <div data-eye=\"1\" style=\"position: absolute; top: 78px; left: 52px; width: 34px; height: 34px; border-radius: 50%; background: oklch(10% 0.02 145); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 8px oklch(0% 0 0 / 0.5);\">\n                <div style=\"{{ pupilStyle }}\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div data-eye=\"1\" style=\"position: absolute; top: 78px; right: 52px; width: 34px; height: 34px; border-radius: 50%; background: oklch(10% 0.02 145); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 8px oklch(0% 0 0 / 0.5);\">\n                <div style=\"{{ pupilStyle }}\"><\u002Fdiv>\n              <\u002Fdiv>\n              <!-- smile -->\n              <div style=\"position: absolute; top: 128px; left: 50%; transform: translateX(-50%); width: 46px; height: 24px; border-radius: 0 0 30px 30px; border-bottom: 5px solid oklch(10% 0.02 145 / 0.8); border-left: 5px solid transparent; border-right: 5px solid transparent;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position: absolute; bottom: 10px; width: 160px; height: 26px; border-radius: 50%; background: radial-gradient(ellipse, oklch(0% 0 0 / 0.6), transparent 70%); filter: blur(4px);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT -->\n  <section id=\"about\" data-screen-label=\"About\" style=\"position: relative; z-index: 1; max-width: 1240px; margin: 0 auto; padding: 60px 40px 120px;\">\n    <div style=\"display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 60px; align-items: start;\">\n      <div>\n        <div style=\"font-family: 'JetBrains Mono', monospace; color: {{ accent }}; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;\">// about<\u002Fdiv>\n        <h2 style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: clamp(28px, 4vw, 42px); margin: 0 0 22px; letter-spacing: -0.5px; color: oklch(92% 0.09 145);\">Four years deep in payments &amp; distributed systems.<\u002Fh2>\n        <p style=\"font-size: 16px; line-height: 1.8; color: oklch(68% 0.05 145); margin: 0;\">\n          Backend Engineer with 4 years of experience designing and owning high-traffic, distributed systems at scale using Java, Spring Boot, Kafka, and Apigee (GCP). Deep expertise in payment systems (Stripe, gift card orchestration, PCI-compliant workflows), event-driven microservices, and API gateway management for large-scale consumer platforms. Proven track record of technical design ownership, incident response, and cross-team delivery.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n        <sc-for list=\"{{ statCards }}\" as=\"stat\" hint-placeholder-count=\"4\">\n          <div style=\"background: oklch(10% 0.02 145); border: 1px solid {{ accentBorder }}; border-radius: 10px; padding: 26px 22px; transition: transform 0.25s;\">\n            <div style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: 30px; color: {{ accent }}; margin-bottom: 6px;\">{{ stat.value }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color: oklch(62% 0.05 145); line-height: 1.4;\">{{ stat.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SKILLS -->\n  <section id=\"skills\" data-screen-label=\"Skills\" style=\"position: relative; z-index: 1; max-width: 1240px; margin: 0 auto; padding: 60px 40px 120px;\">\n    <div style=\"text-align: center; margin-bottom: 48px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; color: {{ accent }}; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;\">// skills<\u002Fdiv>\n      <h2 style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: clamp(28px, 4vw, 42px); margin: 0; letter-spacing: -0.5px; color: oklch(92% 0.09 145);\">Toolbox<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px;\">\n      <sc-for list=\"{{ skillGroups }}\" as=\"grp\" hint-placeholder-count=\"7\">\n        <div style=\"background: oklch(9% 0.018 145); border: 1px solid {{ accentBorder }}; border-radius: 10px; padding: 26px; transition: transform 0.3s, box-shadow 0.3s;\" style-hover=\"transform: translateY(-6px) rotateX(4deg); box-shadow: 0 20px 40px oklch(4% 0.02 145 / 0.6), 0 0 24px {{ accentSoft }}; border-color: {{ accent }};\">\n          <div style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: 16px; margin-bottom: 16px; color: {{ accent }};\">{{ grp.name }}<\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n            <sc-for list=\"{{ grp.tags }}\" as=\"tag\" hint-placeholder-count=\"4\">\n              <span style=\"font-size: 12px; font-family: 'JetBrains Mono', monospace; padding: 6px 11px; border-radius: 5px; background: oklch(13% 0.03 145); color: oklch(78% 0.06 145); border: 1px solid {{ accentBorder }};\">{{ tag }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROJECTS -->\n  <section id=\"projects\" data-screen-label=\"Projects\" style=\"position: relative; z-index: 1; max-width: 1240px; margin: 0 auto; padding: 60px 40px 120px;\">\n    <div style=\"text-align: center; margin-bottom: 48px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; color: {{ accent }}; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;\">// projects<\u002Fdiv>\n      <h2 style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: clamp(28px, 4vw, 42px); margin: 0; letter-spacing: -0.5px; color: oklch(92% 0.09 145);\">Selected work<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 22px;\">\n      <sc-for list=\"{{ projects }}\" as=\"proj\" hint-placeholder-count=\"4\">\n        <div style=\"background: linear-gradient(160deg, oklch(11% 0.02 145), oklch(8% 0.018 145)); border: 1px solid {{ accentBorder }}; border-radius: 12px; padding: 30px; transition: transform 0.3s, box-shadow 0.3s;\" style-hover=\"transform: translateY(-8px); box-shadow: 0 24px 50px oklch(4% 0.02 145 / 0.7), 0 0 30px {{ accentSoft }};\">\n          <sc-if value=\"{{ proj.badge }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display: inline-block; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 4px; background: {{ accentSoft2 }}; color: {{ accent }}; margin-bottom: 14px; font-family: 'JetBrains Mono', monospace; border: 1px solid {{ accentBorder }};\">{{ proj.badge }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: 20px; margin-bottom: 10px; color: oklch(92% 0.09 145);\">{{ proj.title }}<\u002Fdiv>\n          <div style=\"font-size: 12px; font-family: 'JetBrains Mono', monospace; color: {{ accent }}; margin-bottom: 16px;\">{{ proj.stack }}<\u002Fdiv>\n          <ul style=\"margin: 0; padding-left: 18px; color: oklch(68% 0.05 145); font-size: 14px; line-height: 1.75;\">\n            <sc-for list=\"{{ proj.points }}\" as=\"pt\" hint-placeholder-count=\"2\">\n              <li>{{ pt }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE -->\n  <section id=\"experience\" data-screen-label=\"Experience\" style=\"position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 60px 40px 120px;\">\n    <div style=\"text-align: center; margin-bottom: 56px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; color: {{ accent }}; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;\">// experience<\u002Fdiv>\n      <h2 style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: clamp(28px, 4vw, 42px); margin: 0; letter-spacing: -0.5px; color: oklch(92% 0.09 145);\">Timeline<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"position: relative; padding-left: 34px; border-left: 2px solid {{ accentBorder }};\">\n      <sc-for list=\"{{ timeline }}\" as=\"ev\" hint-placeholder-count=\"2\">\n        <div style=\"position: relative; margin-bottom: 50px;\">\n          <div style=\"position: absolute; left: -42px; top: 4px; width: 16px; height: 16px; border-radius: 50%; background: {{ accent }}; box-shadow: 0 0 0 5px oklch(6% 0.01 145), 0 0 16px {{ accentSoft }};\"><\u002Fdiv>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; color: {{ accent }}; margin-bottom: 6px;\">{{ ev.when }}<\u002Fdiv>\n          <div style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: 19px; color: oklch(92% 0.09 145);\">{{ ev.title }}<\u002Fdiv>\n          <div style=\"font-size: 14px; color: oklch(62% 0.05 145); margin-bottom: 14px;\">{{ ev.org }} · {{ ev.place }}<\u002Fdiv>\n          <ul style=\"margin: 0; padding-left: 18px; color: oklch(68% 0.05 145); font-size: 14px; line-height: 1.75;\">\n            <sc-for list=\"{{ ev.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n              <li>{{ pt }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RESUME -->\n  <section id=\"resume\" data-screen-label=\"Resume\" style=\"position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 40px 40px 130px; text-align: center;\">\n    <div style=\"background: linear-gradient(160deg, oklch(11% 0.02 145), oklch(8% 0.018 145)); border: 1px solid {{ accentBorder }}; border-radius: 14px; padding: 56px 40px; box-shadow: 0 30px 60px oklch(4% 0.02 145 / 0.6), 0 0 40px {{ accentSoft }};\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; color: {{ accent }}; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;\">// resume<\u002Fdiv>\n      <h2 style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: clamp(24px, 4vw, 34px); margin: 0 0 16px; letter-spacing: -0.5px; color: oklch(92% 0.09 145);\">Want the full detail?<\u002Fh2>\n      <p style=\"color: oklch(68% 0.05 145); font-size: 15px; margin: 0 0 32px;\">Grab a copy for your records.<\u002Fp>\n      <div style=\"display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;\">\n        <a href=\"uploads/Priyanshu_Shukla_Java_Backend-e7d6bde6.pdf\" download=\"\" style=\"font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14.5px; padding: 15px 28px; border-radius: 6px; background: {{ accent }}; color: oklch(8% 0.02 145); text-decoration: none; box-shadow: 0 0 30px {{ accentSoft }};\">[ download_pdf ]<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" data-screen-label=\"Contact\" style=\"position: relative; z-index: 1; padding: 40px 40px 90px; text-align: center;\">\n    <div style=\"width: 90px; height: 90px; margin: 0 auto 26px; border-radius: 58% 42% 55% 45% / 55% 45% 58% 42%; background: linear-gradient(150deg, {{ accentLight }}, {{ accent }}); animation: floatMascotSmall 4.5s ease-in-out infinite; box-shadow: 0 20px 40px {{ accentSoft }}, 0 0 40px {{ accentSoft }};\"><\u002Fdiv>\n    <h2 style=\"font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: clamp(30px, 5vw, 50px); margin: 0 0 18px; letter-spacing: -0.5px; color: oklch(92% 0.09 145);\">Let's build something.<\u002Fh2>\n    <p style=\"color: oklch(68% 0.05 145); font-size: 15.5px; margin: 0 0 36px;\">Open to backend engineering roles and interesting problems.<\u002Fp>\n    <div style=\"display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; max-width: 700px; margin: 0 auto;\">\n      <sc-for list=\"{{ contactLinks }}\" as=\"link\" hint-placeholder-count=\"5\">\n        <a href=\"{{ link.href }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 13.5px; font-family: 'JetBrains Mono', monospace; padding: 12px 18px; border-radius: 999px; background: oklch(9% 0.018 145); border: 1px solid {{ accentBorder }}; color: oklch(80% 0.06 145); text-decoration: none;\">{{ link.label }}<\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top: 60px; font-size: 12px; color: oklch(45% 0.05 145); font-family: 'JetBrains Mono', monospace;\">© 2026 Priyanshu Shukla — root access granted.<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 1000},\n  &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#00ff66&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#00ff66&quot;, &quot;#39ff14&quot;, &quot;#00ffcc&quot;, &quot;#ffb000&quot;]},\n  &quot;reduceMotion&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { rotX: 0, rotY: 0, active: 'hero' };\n\n  assignCanvas = (el) => {\n    if (el && !this._rainStarted) {\n      this._rainStarted = true;\n      this._canvasEl = el;\n      this._setupRain();\n    }\n  };\n\n  componentDidMount() {\n    this._sections = ['hero','about','skills','projects','experience','resume','contact'];\n\n    this._onMove = (e) => {\n      const w = window.innerWidth || 1, h = window.innerHeight || 1;\n      const rx = ((e.clientY / h) - 0.5) * -10;\n      const ry = ((e.clientX / w) - 0.5) * 14;\n      this.setState({ rotX: rx, rotY: ry, mouseX: e.clientX, mouseY: e.clientY });\n    };\n    window.addEventListener('mousemove', this._onMove);\n\n    this._measureEyes = () => {\n      const eyeEls = document.querySelectorAll('[data-eye=\"1\"]');\n      if (eyeEls.length) {\n        let sx = 0, sy = 0;\n        eyeEls.forEach((el) => {\n          const r = el.getBoundingClientRect();\n          sx += r.left + r.width / 2;\n          sy += r.top + r.height / 2;\n        });\n        this._eyeCenter = { x: sx / eyeEls.length, y: sy / eyeEls.length };\n      }\n    };\n    this._measureEyes();\n    this._eyeMeasureInterval = setInterval(this._measureEyes, 500);\n    window.addEventListener('resize', this._measureEyes);\n\n    this._onScroll = () => {\n      let current = this.state.active;\n      for (const id of this._sections) {\n        const el = document.getElementById(id);\n        if (el) {\n          const top = el.getBoundingClientRect().top;\n          if (top < window.innerHeight * 0.45) current = id;\n        }\n      }\n      if (current !== this.state.active) this.setState({ active: current });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n  }\n\n  _setupRain() {\n    const canvas = this._canvasEl;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const chars = 'アイウエオカキクケコサシスセソ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';\n    let cols, drops, w, h;\n    const fontSize = 16;\n\n    const resize = () => {\n      w = canvas.width = window.innerWidth;\n      h = canvas.height = window.innerHeight;\n      cols = Math.floor(w / fontSize);\n      drops = new Array(cols).fill(0).map(() => Math.random() * -50);\n    };\n    resize();\n    this._rainResize = resize;\n    window.addEventListener('resize', this._rainResize);\n\n    const accent = this.props.accentColor || '#00ff66';\n\n    const draw = () => {\n      if (!ctx) return;\n      ctx.fillStyle = 'rgba(0,0,0,0.06)';\n      ctx.fillRect(0, 0, w, h);\n      ctx.font = fontSize + 'px monospace';\n      for (let i = 0; i < cols; i++) {\n        const char = chars[Math.floor(Math.random() * chars.length)];\n        const y = drops[i] * fontSize;\n        ctx.fillStyle = accent;\n        ctx.globalAlpha = 0.85;\n        ctx.fillText(char, i * fontSize, y);\n        if (y > h && Math.random() > 0.975) drops[i] = 0;\n        drops[i]++;\n      }\n    };\n\n    const reduceMotion = !!this.props.reduceMotion;\n    this._rainInterval = setInterval(draw, reduceMotion ? 200 : 45);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('mousemove', this._onMove);\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._measureEyes) window.removeEventListener('resize', this._measureEyes);\n    if (this._eyeMeasureInterval) clearInterval(this._eyeMeasureInterval);\n    if (this._rainResize) window.removeEventListener('resize', this._rainResize);\n    if (this._rainInterval) clearInterval(this._rainInterval);\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor || '#00ff66';\n    const reduceMotion = !!this.props.reduceMotion;\n    const rotX = reduceMotion ? 0 : this.state.rotX;\n    const rotY = reduceMotion ? 0 : this.state.rotY;\n\n    const accentSoft = accent + '4d';\n    const accentSoft2 = accent + '26';\n    const accentBorder = accent + '55';\n    const accentLight = accent;\n    const accentDark = accent;\n\n    const heroTiltStyleStr = `transform: perspective(1400px) rotateX(${rotX.toFixed(2)}deg) rotateY(${rotY.toFixed(2)}deg); transform-style: preserve-3d; will-change: transform;`;\n\n    const mascotFloatStyle = reduceMotion ? {} : { animation: 'floatMascot 5.5s ease-in-out infinite' };\n    const mascotTiltStyleStr = `transform: perspective(900px) rotateX(${(-rotX * 0.6).toFixed(2)}deg) rotateY(${(rotY * 0.6).toFixed(2)}deg) translateZ(20px);`;\n\n    let pupilDX = 0, pupilDY = 0;\n    if (this._eyeCenter && typeof this.state.mouseX === 'number') {\n      const dx = this.state.mouseX - this._eyeCenter.x;\n      const dy = this.state.mouseY - this._eyeCenter.y;\n      const dist = Math.sqrt(dx * dx + dy * dy) || 1;\n      const maxOffset = 8;\n      const clamped = Math.min(dist, 60);\n      pupilDX = (dx / dist) * (clamped / 60) * maxOffset;\n      pupilDY = (dy / dist) * (clamped / 60) * maxOffset;\n    }\n    const pupilStyle = { width: '14px', height: '14px', borderRadius: '50%', background: accent, boxShadow: `0 0 8px ${accent}`, transform: `translate(${pupilDX.toFixed(1)}px, ${pupilDY.toFixed(1)}px)` };\n\n    const sections = ['hero','about','skills','projects','experience','resume','contact'];\n    const labels = { hero: 'home', about: 'about', skills: 'skills', projects: 'work', experience: 'exp', resume: 'resume', contact: 'contact' };\n    const navItems = sections.filter(s => s !== 'hero').map(id => {\n      const isActive = this.state.active === id;\n      return {\n        href: '#' + id,\n        label: labels[id],\n        color: isActive ? 'oklch(8% 0.02 145)' : accent,\n        bg: isActive ? accent : 'transparent',\n      };\n    });\n\n    const statCards = [\n      { value: '4 yrs', label: 'Backend engineering experience' },\n      { value: '10M+', label: 'Transactions processed / month' },\n      { value: '99.9%', label: 'Uptime SLA maintained' },\n      { value: '4x', label: 'CIO Award + 3x Spot Awards' },\n    ];\n\n    const skillGroups = [\n      { name: 'Languages', tags: ['Java 11/17', 'C++', 'JavaScript', 'SQL'] },\n      { name: 'Backend Frameworks', tags: ['Spring Boot', 'Spring MVC', 'Spring Security', 'Spring Data JPA', 'Hibernate', 'Node.js'] },\n      { name: 'System Design', tags: ['Microservices', 'REST APIs', 'Event-Driven Arch.', 'Circuit Breaker', 'CQRS', 'CAP Theorem'] },\n      { name: 'Messaging & Streaming', tags: ['Apache Kafka', 'GCP Pub/Sub', 'AWS SQS'] },\n      { name: 'Cloud & DevOps', tags: ['GCP Cloud Run', 'Apigee X', 'AWS EC2/S3', 'Docker', 'Kubernetes', 'Jenkins', 'GitHub Actions'] },\n      { name: 'Databases', tags: ['PostgreSQL', 'MySQL'] },\n      { name: 'Quality & Tools', tags: ['JUnit 5', 'Mockito', 'SonarQube', 'Snyk', 'Postman', 'Maven', 'Gradle', 'Git', 'JIRA'] },\n    ];\n\n    const projects = [\n      {\n        title: 'Gift Card Services',\n        stack: 'Java · Spring Boot · Kafka · Apigee · AWS/GCP',\n        badge: null,\n        points: [\n          'Backend microservices for vendor integration and payment orchestration across Dish and Sling platforms.',\n          'Kafka-based async workflows for reliable, decoupled vendor communication.',\n          'API contracts and validation pipelines via Apigee gateway.',\n        ],\n      },\n      {\n        title: 'Credit Card Payment Services — Stripe',\n        stack: 'Java · Spring Boot · Stripe API · Kafka · Apigee',\n        badge: null,\n        points: [\n          'Stripe gateway integration for tokenized card processing and webhook-based event handling.',\n          'PCI-compliant workflows with request signing and real-time monitoring.',\n        ],\n      },\n      {\n        title: 'Netflix Account Integration — DISH Hopper',\n        stack: 'Java · Spring Boot · Apigee · REST APIs',\n        badge: null,\n        points: [\n          'Backend services enabling Netflix account linking and subscription activation on Dish devices.',\n          'Header/payload security policies via Apigee to prevent injection and tampering.',\n        ],\n      },\n      {\n        title: 'AI Receipt Manager & Financial Advisor',\n        stack: 'Google Agentic AI · Google Wallet API',\n        badge: 'Hackathon Finalist · top 9,100 teams',\n        points: [\n          'AI-powered multimodal receipt manager with real-time expense tracking.',\n          'Personalized savings recommendations via Google Wallet API.',\n        ],\n      },\n    ];\n\n    const timeline = [\n      {\n        when: 'Aug 2022 — Present',\n        title: 'Backend Developer',\n        org: 'DISH Network (Echostar)',\n        place: 'Bengaluru, India',\n        points: [\n          'Architected production-grade Java 11/17 microservices with Spring Boot serving millions of subscribers at 99.9%+ uptime.',\n          'Owned Stripe credit card & gift card payment orchestration processing 10M+ transactions/month with PCI-compliant workflows.',\n          'Designed Kafka-based async pipelines, cutting inter-service latency by 40% via dead-letter queue strategies.',\n          'Deployed on GCP (Cloud Run, Apigee X, Pub/Sub) and AWS (EC2, S3, SQS, Lambda) with Docker/Kubernetes auto-scaling.',\n          'Implemented Redis caching (−35% DB load) and query tuning (p99 800ms → <120ms).',\n          'Mentored engineers, enforced 85%+ test coverage, integrated SonarQube/Snyk into CI/CD.',\n        ],\n      },\n      {\n        when: '2018 — 2022',\n        title: 'B.Tech, Computer Science & Engineering',\n        org: 'Amity University, Jaipur',\n        place: 'GPA 8.35/10',\n        points: [],\n      },\n    ];\n\n    const contactLinks = [\n      { label: 'shuklapriyanshu9@gmail.com', href: 'mailto:shuklapriyanshu9@gmail.com' },\n      { label: '+91-7339937939', href: 'tel:+917339937939' },\n      { label: 'linkedin.com/in/pshukl9', href: 'https://linkedin.com/in/pshukl9' },\n      { label: 'github.com/meta-crusher', href: 'https://github.com/meta-crusher' },\n      { label: 'leetcode.com/u/metacrusher', href: 'https://leetcode.com/u/metacrusher' },\n    ];\n\n    return {\n      accent, accentSoft, accentSoft2, accentBorder, accentLight, accentDark,\n      heroTiltStyleStr, mascotFloatStyle, mascotTiltStyleStr, pupilStyle,\n      navItems, statCards, skillGroups, projects, timeline, contactLinks,\n      canvasRef: this.assignCanvas,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
